[mypy]
# Third-party packages without stubs
ignore_missing_imports = True

# Don't run mypy on generation scripts (they import vllm, GPU-only)
exclude = (^agents/|^scripts/)

[mypy-tests.*]
# pytest.TempPathFactory, MagicMock, torch stubs — all missing or partial
ignore_errors = True

[mypy-pipeline.aggregation]
# transformers/sentence-transformers lazy imports use TYPE_CHECKING pattern;
# runtime types differ from the annotated types because they're loaded dynamically.
ignore_errors = True
